<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reruns — Armenian Vocab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15151a;
    --ink: #ece9e2;
    --ink-soft: #b5b2a8;
    --ink-faint: #6f6d68;
    --line: #2a2a30;
    --surface: #1c1c22;
    --accent: #e0a84e;
    --accent-soft: #3a3122;
    --correct: #6fb98a;
    --correct-soft: #1f2c24;
    --wrong: #d97468;
    --wrong-soft: #2e2120;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 40px 20px 80px;
  }

  .app { width: 100%; max-width: 600px; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .streak-line {
    font-size: 13px;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .streak-line .count { color: var(--accent); font-weight: 700; }

  .episode-strip {
    display: flex;
    gap: 3px;
    margin: 18px 0 32px;
  }
  .ep-mark { flex: 1; height: 3px; background: var(--line); border-radius: 2px; }
  .ep-mark.done { background: var(--accent); }
  .ep-mark.today { background: var(--accent-soft); border: 1px solid var(--accent); height: 2px; }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 22px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 0 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-faint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    user-select: none;
    transition: color 0.15s ease;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--ink); }

  /* ---------- Quiz card ---------- */
  .quiz-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 56px 36px 40px;
    text-align: center;
    background: var(--surface);
  }
  .progress-label {
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 22px;
    font-weight: 600;
  }
  .subtitle-word {
    font-family: 'Noto Sans Armenian', sans-serif;
    font-weight: 600;
    font-size: 38px;
    color: var(--ink);
    margin-bottom: 8px;
    word-break: break-word;
    line-height: 1.2;
  }
  .subtitle-direction {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .answer-row { display: flex; gap: 10px; margin-top: 26px; width: 100%; }
  .answer-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--correct); background: var(--correct-soft); }
  .answer-input.wrong { border-color: var(--wrong); background: var(--wrong-soft); }

  .btn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 13px 24px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s ease;
    min-height: 46px;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn-block { width: 100%; padding: 13px 0; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--ink-soft);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
  .btn-accent { background: var(--accent); color: var(--bg); }

  .feedback { margin-top: 18px; font-size: 14px; font-weight: 600; min-height: 20px; }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  .next-btn { margin-top: 16px; width: 100%; }
  .ignore-link {
    font-size: 12px;
    color: var(--ink-faint);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: color 0.15s ease, text-decoration-color 0.15s ease;
  }
  .ignore-link:hover { color: var(--accent); text-decoration-color: var(--accent); }

  /* ---------- Empty state ---------- */
  .empty-state { text-align: center; padding: 30px 10px; color: var(--ink-soft); }
  .empty-state .big {
    font-family: 'Source Serif 4', serif;
    font-size: 19px; font-weight: 600; color: var(--ink); margin-bottom: 8px;
  }
  .empty-state .small { font-size: 13px; line-height: 1.6; color: var(--ink-faint); max-width: 360px; margin: 0 auto; }

  /* ---------- Import ---------- */
  .import-box textarea {
    width: 100%;
    min-height: 150px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    outline: none;
    margin-bottom: 12px;
  }
  .import-box textarea:focus { border-color: var(--accent); }
  .import-box .hint { font-size: 12.5px; color: var(--ink-faint); margin-bottom: 16px; line-height: 1.6; }
  .import-result { margin-top: 14px; font-size: 13px; color: var(--correct); font-weight: 600; }

  /* ---------- Stats ---------- */
  .stats-row { display: flex; gap: 1px; margin-bottom: 28px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .stat-card { flex: 1; padding: 16px 8px; text-align: center; background: var(--surface); }
  .stat-card + .stat-card { border-left: 1px solid var(--line); }
  .stat-card .num {
    font-family: 'Source Serif 4', serif;
    font-size: 26px; font-weight: 700; color: var(--ink);
  }
  .stat-card .label { font-size: 10.5px; color: var(--ink-faint); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-faint);
    margin: 8px 0 12px;
  }

  /* ---------- Search ---------- */
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 18px;
  }
  .search-input:focus { border-color: var(--accent); }

  /* ---------- Word list ---------- */
  .word-list { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .word-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    padding: 13px 16px;
    font-size: 14px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .word-row:hover { background: #232329; }
  .word-row .pair { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; min-width: 0; }
  .word-row .en { font-weight: 600; }
  .word-row .hy { color: var(--accent); font-family: 'Noto Sans Armenian', sans-serif; font-weight: 500; }
  .word-row .box-badge {
    font-size: 10.5px; color: var(--ink-faint); background: var(--bg);
    border-radius: 6px; padding: 3px 8px; font-weight: 600; flex-shrink: 0;
  }

  /* ---------- Practice detail panel ---------- */
  .practice-detail {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 32px 28px;
    background: var(--surface);
    margin-bottom: 18px;
  }
  .practice-detail .back-link {
    font-size: 13px;
    color: var(--ink-faint);
    cursor: pointer;
    margin-bottom: 20px;
    display: inline-block;
    font-weight: 600;
  }
  .practice-detail .back-link:hover { color: var(--accent); }
  .practice-pair { text-align: center; margin-bottom: 24px; }
  .practice-pair .hy-word {
    font-family: 'Noto Sans Armenian', sans-serif;
    font-size: 30px; font-weight: 600; color: var(--ink); margin-bottom: 4px;
  }
  .practice-pair .en-word { font-size: 15px; color: var(--ink-faint); font-weight: 500; }

  .sentence-block {
    border-top: 1px solid var(--line);
    padding-top: 20px;
    margin-top: 20px;
  }
  .sentence-en { font-size: 15px; color: var(--ink); margin-bottom: 6px; line-height: 1.5; }
  .sentence-hy { font-family: 'Noto Sans Armenian', sans-serif; font-size: 15px; color: var(--accent); line-height: 1.5; }
  .sentence-loading { font-size: 13px; color: var(--ink-faint); }
  .sentence-error { font-size: 13px; color: var(--wrong); }

  .practice-actions { display: flex; gap: 10px; margin-top: 22px; }

  /* ---------- Multiple choice (Quiz) ---------- */
  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-top: 22px;
  }
  .mc-option {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: all 0.12s ease;
    word-break: break-word;
  }
  .mc-option:hover { border-color: var(--accent); }
  .mc-option.correct { border-color: var(--correct); background: var(--correct-soft); }
  .mc-option.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
  .mc-option.disabled { pointer-events: none; }

  /* ---------- Match game ---------- */
  .mc-option-match {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 12px 10px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    word-break: break-word;
  }
  .mc-option-match:hover { border-color: var(--accent); }
  .mc-option-match.selected { border-color: var(--accent); background: var(--accent-soft); }
  .mc-option-match.wrong-flash { border-color: var(--wrong); background: var(--wrong-soft); }
  .mc-option-match.solved {
    border-color: var(--correct-soft);
    background: var(--correct-soft);
    color: var(--correct);
    cursor: default;
    opacity: 0.7;
  }
  .mc-option-match.solved::after { content: " ✓"; }

  @media (max-width: 460px) {
    .subtitle-word { font-size: 28px; }
    .quiz-card { padding: 40px 22px 30px; }
    .tabs { gap: 14px; }
    .stats-row { flex-wrap: wrap; }
    .stat-card { flex: 1 1 calc(50% - 1px); }
    .stat-card:nth-child(3) { border-left: 1px solid var(--line); }
  }
</style>
<script src="https://js.puter.com/v2/"></script>
</head>
<body>
<div class="app">
  <div id="loginScreen" style="display:none;">
    <div class="quiz-card" style="padding:40px 32px;">
      <div class="logo" style="margin-bottom:24px; text-align:center;">reruns</div>
      <label style="font-size:12px; color:var(--ink-faint); font-weight:600; display:block; margin-bottom:6px;">Email</label>
      <input type="email" class="search-input" id="loginEmail" style="margin-bottom:14px;" autocomplete="username" />
      <label style="font-size:12px; color:var(--ink-faint); font-weight:600; display:block; margin-bottom:6px;">Password</label>
      <input type="password" class="search-input" id="loginPassword" style="margin-bottom:18px;" autocomplete="current-password" />
      <button class="btn btn-accent btn-block" id="loginBtn">Sign in</button>
      <div id="loginError" style="color:var(--wrong); font-size:12.5px; margin-top:12px; text-align:center;"></div>
    </div>
  </div>

  <div id="mainApp" style="display:none;">
    <div class="header">
      <div class="logo">reruns</div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="streak-line"><span class="count" id="streakCount">0</span> day series</div>
        <span id="logoutBtn" style="font-size:12px; color:var(--ink-faint); cursor:pointer; font-weight:600;">Sign out</span>
      </div>
    </div>

    <div class="episode-strip" id="episodeStrip"></div>

    <div class="tabs">
      <div class="tab active" data-tab="quiz">Quiz</div>
      <div class="tab" data-tab="practice">Practice</div>
      <div class="tab" data-tab="match">Match</div>
      <div class="tab" data-tab="words">Words</div>
      <div class="tab" data-tab="import">Import</div>
    </div>

    <div id="quizPanel"></div>
    <div id="practicePanel" style="display:none;"></div>
    <div id="matchPanel" style="display:none;"></div>
    <div id="wordsPanel" style="display:none;"></div>
    <div id="importPanel" style="display:none;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, addDoc, setDoc, getDoc,
  updateDoc, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ===== CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyDmszsxVjsgoiyad2C0Zb4fgGJmhU8uK_g",
  authDomain: "armenian-vocab.firebaseapp.com",
  projectId: "armenian-vocab",
  storageBucket: "armenian-vocab.firebasestorage.app",
  messagingSenderId: "535107629746",
  appId: "1:535107629746:web:9553753bb81bf0333b8fab"
};
// ===================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const wordsRef = collection(db, "words");

const META_DOC_ID = "streak_meta";

function todayStr() { return new Date().toISOString().slice(0, 10); }
function daysBetween(a, b) {
  const d1 = new Date(a + "T00:00:00Z");
  const d2 = new Date(b + "T00:00:00Z");
  return Math.round((d2 - d1) / 86400000);
}

async function getStreakMeta() {
  const ref = doc(db, "meta", META_DOC_ID);
  const snap = await getDoc(ref);
  if (snap.exists()) return snap.data();
  return { streak: 0, lastCompletedDate: null, history: [] };
}

async function recordSessionComplete() {
  const ref = doc(db, "meta", META_DOC_ID);
  const meta = await getStreakMeta();
  const today = todayStr();
  if (meta.lastCompletedDate === today) return meta;

  let newStreak = 1;
  if (meta.lastCompletedDate) {
    const gap = daysBetween(meta.lastCompletedDate, today);
    if (gap === 1) newStreak = (meta.streak || 0) + 1;
    else if (gap === 0) newStreak = meta.streak || 1;
    else newStreak = 1;
  }
  const history = (meta.history || []).concat([today]).slice(-30);
  const updated = { streak: newStreak, lastCompletedDate: today, history };
  await setDoc(ref, updated, { merge: true });
  return updated;
}

function boxIntervalDays(box) {
  const map = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 16 };
  return map[box] ?? 0;
}

function isDue(word) {
  if (word.ignored) return false;
  if (!word.nextReview) return true;
  const nextReview = word.nextReview.toDate ? word.nextReview.toDate() : new Date(word.nextReview);
  return nextReview <= new Date();
}

async function fetchAllWords() {
  const snap = await getDocs(wordsRef);
  const list = [];
  snap.forEach(d => list.push({ id: d.id, ...d.data() }));
  return list;
}

async function updateWordAfterAnswer(word, correct) {
  const ref = doc(db, "words", word.id);
  let newBox = word.box || 1;
  let newCorrectStreak = word.correctStreak || 0;
  let newFailCount = word.failCount || 0;

  if (correct) { newBox = Math.min(5, newBox + 1); newCorrectStreak += 1; }
  else { newBox = 1; newCorrectStreak = 0; newFailCount += 1; }

  const days = boxIntervalDays(newBox);
  const next = new Date();
  next.setDate(next.getDate() + days);

  await updateDoc(ref, {
    box: newBox,
    correctStreak: newCorrectStreak,
    failCount: newFailCount,
    lastReviewed: Timestamp.fromDate(new Date()),
    nextReview: Timestamp.fromDate(next)
  });
}

// A "leech" is a word that keeps getting forgotten - useful to surface separately
// since spaced repetition alone won't fix a word that's genuinely not sticking.
const LEECH_THRESHOLD = 3;
function isLeech(word) {
  return (word.failCount || 0) >= LEECH_THRESHOLD;
}

// ---------- State ----------
let allWords = [];
let dueQueue = [];
let currentIndex = 0;
let sessionDone = 0;

const quizPanel = document.getElementById("quizPanel");
const practicePanel = document.getElementById("practicePanel");
const matchPanel = document.getElementById("matchPanel");
const wordsPanel = document.getElementById("wordsPanel");
const importPanel = document.getElementById("importPanel");

const panels = { quiz: quizPanel, practice: practicePanel, match: matchPanel, words: wordsPanel, import: importPanel };

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const target = tab.dataset.tab;
    Object.entries(panels).forEach(([key, el]) => { el.style.display = key === target ? "block" : "none"; });
    if (target === "words") renderWordsPanel();
    if (target === "import") renderImportPanel();
    if (target === "practice") startPracticeSession();
    if (target === "match") renderMatchGame();
  });
});

async function renderStreak() {
  const meta = await getStreakMeta();
  document.getElementById("streakCount").textContent = meta.streak || 0;
  const strip = document.getElementById("episodeStrip");
  strip.innerHTML = "";
  const history = meta.history || [];
  const today = todayStr();
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const mark = document.createElement("div");
    mark.className = "ep-mark";
    if (history.includes(ds)) mark.classList.add("done");
    else if (ds === today) mark.classList.add("today");
    strip.appendChild(mark);
  }
}

const MAX_QUIZ_SESSION_SIZE = 15;

async function loadQueue() {
  allWords = await fetchAllWords();
  dueQueue = allWords.filter(isDue).sort(() => Math.random() - 0.5).slice(0, MAX_QUIZ_SESSION_SIZE);
  sessionDone = 0;
  currentIndex = 0;
}

// Rebuilds the queue from every non-ignored word (not just ones currently due),
// so "Retake quiz" always has something to review even right after finishing.
async function retakeQuiz() {
  allWords = await fetchAllWords();
  dueQueue = allWords.filter(w => !w.ignored).sort(() => Math.random() - 0.5).slice(0, MAX_QUIZ_SESSION_SIZE);
  sessionDone = 0;
  currentIndex = 0;
  renderQuiz();
}

function renderEmptyState(container, message, sub, retakeFn) {
  container.innerHTML = `
    <div class="quiz-card">
      <div class="empty-state">
        <div class="big">${message}</div>
        <div class="small">${sub}</div>
      </div>
      ${retakeFn ? `<button class="btn btn-accent btn-block" id="retakeBtn" style="margin-top:20px;">Retake quiz</button>` : ""}
    </div>
  `;
  if (retakeFn) {
    document.getElementById("retakeBtn").addEventListener("click", retakeFn);
  }
}

async function renderQuiz() {
  if (allWords.length === 0) {
    renderEmptyState(quizPanel, "No words yet", "Translate something English → Armenian on translate.google.com with the extension installed, or paste your phone history in the Import tab.");
    return;
  }
  if (currentIndex >= dueQueue.length) {
    if (sessionDone > 0) { await recordSessionComplete(); await renderStreak(); }
    renderEmptyState(
      quizPanel,
      sessionDone > 0 ? "Episode complete" : "All caught up",
      sessionDone > 0
        ? `You reviewed ${sessionDone} word${sessionDone === 1 ? "" : "s"}. Come back tomorrow for the next one — or retake now to review again.`
        : "No words are due for review right now. Retake anyway, or visit Practice to drill any word.",
      retakeQuiz
    );
    return;
  }

  const word = dueQueue[currentIndex];
  // Question type is decided by this word's own box level, not chance:
  // new/shaky words (box 1-2) get multiple choice first; proven words (box 3+) get typing.
  // This stays consistent for a given word until it actually levels up.
  const useTyping = (word.box || 1) >= 3;

  if (useTyping) {
    renderTypeStep(word);
  } else {
    renderChoiceStep(word);
  }
}

function advanceSession() {
  sessionDone++;
  currentIndex++;
  renderQuiz();
}

function renderTypeStep(word) {
  const direction = Math.random() < 0.5 ? "hy-to-en" : "en-to-hy";
  const promptWord = direction === "hy-to-en" ? word.armenian : word.english;
  const promptFont = direction === "hy-to-en" ? "font-family:'Noto Sans Armenian',sans-serif;" : "";
  const directionLabel = direction === "hy-to-en" ? "type the English translation" : "type the Armenian translation";

  quizPanel.innerHTML = `
    <div class="quiz-card">
      <div class="progress-label">Word ${currentIndex + 1} of ${dueQueue.length}</div>
      <div class="subtitle-word" style="${promptFont}">${promptWord}</div>
      <div class="subtitle-direction">${directionLabel}</div>
      <div id="answerArea" style="width:100%;"></div>
      <div class="feedback" id="feedback"></div>
      ${renderIgnoreButtonHtml()}
    </div>
  `;

}

// Multiple choice for new/shaky words - recognition is easier than recall,
// so this is how a word is introduced before typing is ever demanded.
function renderChoiceStep(word) {
  const direction = Math.random() < 0.5 ? "hy-to-en" : "en-to-hy";
  const promptWord = direction === "hy-to-en" ? word.armenian : word.english;
  const promptFont = direction === "hy-to-en" ? "font-family:'Noto Sans Armenian',sans-serif;" : "";
  const directionLabel = direction === "hy-to-en" ? "choose the English translation" : "choose the Armenian translation";
  const correctAnswer = direction === "hy-to-en" ? word.english : word.armenian;
  const answerFont = direction === "hy-to-en" ? "" : "font-family:'Noto Sans Armenian',sans-serif;";

  const otherWords = allWords.filter(w => w.id !== word.id);
  const distractors = otherWords
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => direction === "hy-to-en" ? w.english : w.armenian);
  const options = [correctAnswer, ...distractors].sort(() => Math.random() - 0.5);

  quizPanel.innerHTML = `
    <div class="quiz-card">
      <div class="progress-label">Word ${currentIndex + 1} of ${dueQueue.length}</div>
      <div class="subtitle-word" style="${promptFont}">${promptWord}</div>
      <div class="subtitle-direction">${directionLabel}</div>
      <div class="mc-grid" id="choiceGrid" style="${answerFont}"></div>
      <div class="feedback" id="feedback"></div>
      ${renderIgnoreButtonHtml()}
    </div>
  `;

  const grid = document.getElementById("choiceGrid");
  const feedback = document.getElementById("feedback");
  let answered = false;
  options.forEach(opt => {
    const btn = document.createElement("div");
    btn.className = "mc-option";
    btn.textContent = opt;
    btn.addEventListener("click", async () => {
      if (answered) return;
      answered = true;

      const correct = opt === correctAnswer;
      document.querySelectorAll(".mc-option").forEach(o => {
        o.classList.add("disabled");
        if (o.textContent === correctAnswer) o.classList.add("correct");
        else if (o === btn && !correct) o.classList.add("wrong");
      });
      feedback.textContent = correct ? "Correct" : `Not quite — it's "${correctAnswer}"`;
      feedback.className = "feedback " + (correct ? "correct" : "wrong");

      await updateWordAfterAnswer(word, correct);
      const idx = allWords.findIndex(w => w.id === word.id);
      if (idx >= 0) allWords[idx] = { ...allWords[idx], box: correct ? Math.min(5, (word.box||1)+1) : 1 };

      const nextBtn = document.createElement("button");
      nextBtn.className = "btn btn-ghost next-btn";
      nextBtn.textContent = "Next →";
      nextBtn.addEventListener("click", advanceSession);
      grid.parentElement.appendChild(nextBtn);
    });
    grid.appendChild(btn);
  });

  wireIgnoreButton(word);
}

// "I know this" button - removes a word from the daily Quiz permanently.
// It stays visible and editable in Words/Practice, just excluded from review.
function renderIgnoreButtonHtml() {
  return `<div style="margin-top:18px;"><span class="ignore-link" id="ignoreLink">I already know this word — stop asking</span></div>`;
}

function wireIgnoreButton(word) {
  const link = document.getElementById("ignoreLink");
  if (!link) return;
  link.addEventListener("click", async () => {

    dueQueue.splice(currentIndex, 1); // remove from today's queue without shifting the rest forward incorrectly
    renderQuiz();

// Levenshtein distance - used to allow small typos without marking an answer wrong
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i - 1] === b[j - 1]) dp[i][j] = dp[i - 1][j - 1];
      else dp[i][j] = 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
    }
  }
  return dp[m][n];
}

// Allows answers with a small typo to still count as correct - a single mistyped
// letter usually means the person knew the word, not that they forgot it.
function isCloseEnough(typed, target) {
  const a = typed.trim().toLowerCase();
  const b = target.trim().toLowerCase();
  if (a === b) return true;
  const maxAllowedDistance = b.length <= 3 ? 0 : b.length <= 7 ? 1 : 2;
  return levenshtein(a, b) <= maxAllowedDistance;
}

function wireTypingQuestion(word, answerArea, feedback, onNext, direction = "hy-to-en") {
  const askingFor = direction === "hy-to-en" ? word.english : word.armenian;
  const placeholder = direction === "hy-to-en" ? "Type in English…" : "Type in Armenian…";

  const row = document.createElement("div");
  row.className = "answer-row";
  row.innerHTML = `
    <input type="text" class="answer-input" id="typeInput" placeholder="${placeholder}" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <button class="btn" id="submitBtn">Check</button>
  `;
  answerArea.appendChild(row);
  const input = document.getElementById("typeInput");
  const submitBtn = document.getElementById("submitBtn");
  input.focus();

  const submit = async () => {
    const val = input.value.trim();
    if (!val) return;
    const exact = val.toLowerCase() === askingFor.toLowerCase();
    const closeEnough = !exact && isCloseEnough(val, askingFor);
    const correct = exact || closeEnough;

    input.classList.add(correct ? "correct" : "wrong");
    input.disabled = true;
    submitBtn.disabled = true;

    if (correct && closeEnough) {
      feedback.textContent = `Close enough — small typo. It's "${askingFor}"`;
      feedback.className = "feedback correct";
    } else {
      feedback.textContent = correct ? "Correct" : `Not quite — it's "${askingFor}"`;
      feedback.className = "feedback " + (correct ? "correct" : "wrong");
    }

    await updateWordAfterAnswer(word, correct);
    const idx = allWords.findIndex(w => w.id === word.id);
    if (idx >= 0) {
      allWords[idx] = {
        ...allWords[idx],
        box: correct ? Math.min(5, (word.box||1)+1) : 1,
        failCount: correct ? (word.failCount || 0) : (word.failCount || 0) + 1
      };
    }

    const nextBtn = document.createElement("button");
    nextBtn.className = "btn btn-ghost next-btn";
    nextBtn.textContent = "Next →";
    nextBtn.addEventListener("click", onNext);
    answerArea.appendChild(nextBtn);
  };

  submitBtn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

// ---------- Practice session (auto-selects your weakest words) ----------
let practiceQueue = [];
let practiceIndex = 0;
const PRACTICE_BATCH_SIZE = 10;

// Ranks words so low box level and high fail count both push a word toward the
// front (worse score = practiced sooner), with a little randomness mixed in so
// the same exact order doesn't repeat every single time.
function practiceWeaknessScore(word) {
  const box = word.box || 1;
  const fails = word.failCount || 0;
  return box - fails * 0.75 + Math.random() * 0.5;
}

async function startPracticeSession() {
  allWords = await fetchAllWords();
  const eligible = allWords.filter(w => !w.ignored);

  if (eligible.length === 0) {
    renderEmptyState(practicePanel, "No words yet", "Translate something English → Armenian on translate.google.com with the extension installed, or paste your phone history in the Import tab.");
    return;
  }

  practiceQueue = [...eligible]
    .sort((a, b) => practiceWeaknessScore(a) - practiceWeaknessScore(b))
    .slice(0, PRACTICE_BATCH_SIZE);
  practiceIndex = 0;

  renderPracticeStep();
}

function renderPracticeStep() {
  if (practiceIndex >= practiceQueue.length) {
    renderEmptyState(
      practicePanel,
      "Session complete",
      `You practiced ${practiceQueue.length} word${practiceQueue.length === 1 ? "" : "s"} in context.`,
      startPracticeSession
    );
    return;
  }

  const word = practiceQueue[practiceIndex];
  practicePanel.innerHTML = `
    <div class="practice-detail">
      <div class="progress-label" style="margin-bottom:18px;">Word ${practiceIndex + 1} of ${practiceQueue.length}</div>
      <div id="blankQuizArea"></div>
    </div>
  `;
  loadBlankQuestion(word, advancePracticeSession);
}

function advancePracticeSession() {
  practiceIndex++;
  renderPracticeStep();
}

// ---------- Example sentence generator (fill-in-the-blank) ----------
// Builds a fill-in-the-blank question using a real AI model (via Puter.js, free
// and keyless) so the sentence is genuinely natural and grammatically correct for
// whatever part of speech the word actually is - something fixed templates can't
// reliably do. Falls back to a simple, clearly-labeled placeholder if the AI call
// fails, so the feature degrades instead of breaking.
async function generateBlankQuestion(word) {
  const prompt = `Write one short, natural English sentence (max 12 words) that uses the word "${word.english}" in context, the way it might appear in everyday spoken dialogue or TV subtitles. Respond with ONLY the sentence, nothing else - no labels, no quotes, no extra text.`;

  try {
    const response = await puter.ai.chat(prompt, { model: "claude-sonnet-4-6" });
    let text = "";
    if (typeof response === "string") {
      text = response;
    } else if (response?.message?.content) {
      const content = response.message.content;
      text = Array.isArray(content) ? (content[0]?.text || "") : content;
    } else if (response?.text) {
      text = response.text;
    }
    const full = text.trim().replace(/^["']|["']$/g, "");

    if (!full) throw new Error("No sentence returned");

    const re = new RegExp(word.english.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i");
    if (!re.test(full)) throw new Error("Word not found in generated sentence");
    const blanked = full.replace(re, "____");

    return { blanked, failed: false };
  } catch (err) {
    console.error("[Fill-in-the-blank] Generation failed:", err);
    return {
      blanked: `Couldn't generate a sentence right now — try again in a moment.`,
      failed: true
    };
  }
}

// Loads a fill-in-the-blank question into the Practice view automatically (no
// button click needed) and wires up checking + a "New sentence" retry action.
async function loadBlankQuestion(word, onNext) {
  const area = document.getElementById("blankQuizArea");
  if (!area) return;
  area.innerHTML = `<div class="sentence-loading">Writing a sentence…</div>`;

  const { blanked, failed } = await generateBlankQuestion(word);

  if (failed) {
    area.innerHTML = `
      <div class="sentence-error">${blanked}</div>
      <button class="btn btn-ghost btn-block" id="retrySentenceBtn" style="margin-top:14px;">Try again</button>
    `;
    document.getElementById("retrySentenceBtn").addEventListener("click", () => loadBlankQuestion(word, onNext));
    return;
  }

  area.innerHTML = `
    <div class="quiz-card" style="padding:36px 28px;">
      <div class="subtitle-word" style="font-size:24px; line-height:1.4;">${blanked}</div>
      <div class="answer-row" style="margin-top:22px;">
        <input type="text" class="answer-input" id="blankInput" placeholder="Type the missing word…" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <button class="btn" id="blankCheckBtn">Check</button>
      </div>
      <div class="feedback" id="blankFeedback"></div>
    </div>
  `;

  const input = document.getElementById("blankInput");
  const checkBtn = document.getElementById("blankCheckBtn");
  const feedback = document.getElementById("blankFeedback");
  input.focus();

  const submit = async () => {
    const val = input.value.trim();
    if (!val) return;
    const exact = val.toLowerCase() === word.english.toLowerCase();
    const correct = exact || isCloseEnough(val, word.english);

    input.classList.add(correct ? "correct" : "wrong");
    input.disabled = true;
    checkBtn.disabled = true;
    feedback.textContent = correct ? "Correct" : `Not quite — it's "${word.english}"`;
    feedback.className = "feedback " + (correct ? "correct" : "wrong");

    await updateWordAfterAnswer(word, correct);

    const nextBtn = document.createElement("button");
    nextBtn.className = "btn btn-accent next-btn";
    nextBtn.textContent = onNext ? "Next →" : "New sentence →";
    nextBtn.addEventListener("click", () => {
      if (onNext) onNext();
      else loadBlankQuestion(word, onNext);
    });
    document.querySelector(".quiz-card").appendChild(nextBtn);
  };

  checkBtn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

// ---------- Match game ----------
let matchState = { selectedEn: null, selectedHy: null, matchedIds: new Set(), words: [] };

async function renderMatchGame() {
  const all = await fetchAllWords();
  if (all.length < 4) {
    renderEmptyState(matchPanel, "Not enough words yet", "Add at least 4 words to play Match.");
    return;
  }

  const batchSize = Math.min(6, all.length);
  const batch = all.sort(() => Math.random() - 0.5).slice(0, batchSize);
  matchState = { selectedEn: null, selectedHy: null, matchedIds: new Set(), words: batch };

  matchPanel.innerHTML = `
    <div class="quiz-card" style="padding:28px 22px;">
      <div class="progress-label" id="matchProgress">Match each pair · 0 of ${batch.length}</div>
      <div id="matchGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; margin-top:10px;"></div>
      <div id="matchDoneArea" style="margin-top:18px;"></div>
    </div>
  `;
  drawMatchGrid();
}

function drawMatchGrid(onComplete) {
  const grid = document.getElementById("matchGrid");
  if (!grid) return;
  grid.innerHTML = "";

  // Shuffle order is decided once per round and cached on matchState, so the
  // layout stays stable as pairs get solved instead of jumping around.
  if (!matchState.shuffledEn) matchState.shuffledEn = [...matchState.words].sort(() => Math.random() - 0.5);
  if (!matchState.shuffledHy) matchState.shuffledHy = [...matchState.words].sort(() => Math.random() - 0.5);

  const enCol = document.createElement("div");
  enCol.style.display = "flex"; enCol.style.flexDirection = "column"; enCol.style.gap = "8px";
  const hyCol = document.createElement("div");
  hyCol.style.display = "flex"; hyCol.style.flexDirection = "column"; hyCol.style.gap = "8px";

  matchState.shuffledEn.forEach(w => {
    const solved = matchState.matchedIds.has(w.id);
    const cell = document.createElement("div");
    cell.className = "mc-option-match" + (solved ? " solved" : "");
    cell.textContent = w.english;
    cell.dataset.id = w.id;
    if (!solved) cell.addEventListener("click", () => handleMatchClick(w.id, "en", cell, onComplete));
    enCol.appendChild(cell);
  });

  matchState.shuffledHy.forEach(w => {
    const solved = matchState.matchedIds.has(w.id);
    const cell = document.createElement("div");
    cell.className = "mc-option-match" + (solved ? " solved" : "");
    cell.textContent = w.armenian;
    cell.style.fontFamily = "'Noto Sans Armenian', sans-serif";
    cell.dataset.id = w.id;
    if (!solved) cell.addEventListener("click", () => handleMatchClick(w.id, "hy", cell, onComplete));
    hyCol.appendChild(cell);
  });

  grid.appendChild(enCol);
  grid.appendChild(hyCol);

  if (matchState.matchedIds.size === matchState.words.length) {
    if (onComplete) {
      onComplete();
    } else {
      const doneArea = document.getElementById("matchDoneArea");
      doneArea.innerHTML = `
        <div class="feedback correct" style="text-align:center;">All matched 🎉</div>
        <button class="btn btn-accent btn-block" id="matchAgainBtn" style="margin-top:10px;">Play again</button>
      `;
      document.getElementById("matchAgainBtn").addEventListener("click", renderMatchGame);
    }
  }
}

function handleMatchClick(id, side, cellEl, onComplete) {
  if (matchState.matchedIds.has(id)) return;

  if (side === "en") {
    if (matchState.selectedEnEl) matchState.selectedEnEl.classList.remove("selected");
    matchState.selectedEn = id;
    matchState.selectedEnEl = cellEl;
    cellEl.classList.add("selected");
  } else {
    if (matchState.selectedHyEl) matchState.selectedHyEl.classList.remove("selected");
    matchState.selectedHy = id;
    matchState.selectedHyEl = cellEl;
    cellEl.classList.add("selected");
  }

  if (matchState.selectedEn && matchState.selectedHy) {
    if (matchState.selectedEn === matchState.selectedHy) {
      const matchedWord = matchState.words.find(w => w.id === matchState.selectedEn);
      matchState.matchedIds.add(matchState.selectedEn);
      matchState.selectedEn = null;
      matchState.selectedHy = null;
      matchState.selectedEnEl = null;
      matchState.selectedHyEl = null;
      if (matchedWord) updateWordAfterAnswer(matchedWord, true); // matching it correctly counts as a successful review
      const progress = document.getElementById("matchProgress");
      if (progress) {
        progress.textContent = matchState.stepsRemaining != null
          ? `Match round · ${matchState.matchedIds.size} of ${matchState.words.length} · ${matchState.stepsRemaining} left`
          : `Match each pair · ${matchState.matchedIds.size} of ${matchState.words.length}`;
      }
      drawMatchGrid(onComplete);
    } else {
      // Wrong pair - brief flash, then reset selection
      const wrongEnEl = matchState.selectedEnEl, wrongHyEl = matchState.selectedHyEl;
      wrongEnEl.classList.add("wrong-flash");
      wrongHyEl.classList.add("wrong-flash");
      setTimeout(() => {
        wrongEnEl.classList.remove("selected", "wrong-flash");
        wrongHyEl.classList.remove("selected", "wrong-flash");
      }, 400);
      matchState.selectedEn = null;
      matchState.selectedHy = null;
      matchState.selectedEnEl = null;
      matchState.selectedHyEl = null;
    }
  }
}


function parseImportText(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const pairs = [];
  const isShort = (s) => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 3) return false;
    if (/[.!?]\s*$/.test(s.trim())) return false;
    return true;
  };
  const isArmenian = (s) => /[\u0530-\u058F]/.test(s);
  const isEnglish = (s) => /^[a-zA-Z\s'-]+$/.test(s);

  for (let i = 0; i < lines.length - 1; i++) {
    const a = lines[i], b = lines[i + 1];
    if (!isShort(a) || !isShort(b)) continue;
    if (isEnglish(a) && isArmenian(b)) pairs.push({ english: a, armenian: b });
    else if (isArmenian(a) && isEnglish(b)) pairs.push({ english: b, armenian: a });
  }
  return pairs;
}

async function importPairs(pairs) {
  const existing = await fetchAllWords();
  const existingLower = new Set(existing.map(w => (w.english || "").toLowerCase()));
  let added = 0;
  for (const pair of pairs) {
    const key = pair.english.toLowerCase();
    if (existingLower.has(key)) continue;
    existingLower.add(key);
    const now = Timestamp.fromDate(new Date());
    await addDoc(wordsRef, {
      english: pair.english, english_lower: key, armenian: pair.armenian,
      box: 1, correctStreak: 0, lastReviewed: null, nextReview: now, createdAt: now
    });
    added++;
  }
  return added;
}

function renderImportPanel() {
  importPanel.innerHTML = `
    <div class="import-box">
      <div class="hint">Paste copied text from your Google Translate app history (myactivity.google.com → search "Translate"). Pairs of 3 words or fewer are detected automatically; longer lines are skipped.</div>
      <textarea id="importText" placeholder="Paste your copied history here…"></textarea>
      <button class="btn btn-accent btn-block" id="importBtn">Import words</button>
      <div class="import-result" id="importResult"></div>
    </div>
  `;
  document.getElementById("importBtn").addEventListener("click", async () => {
    const raw = document.getElementById("importText").value;
    const pairs = parseImportText(raw);
    const result = document.getElementById("importResult");
    if (pairs.length === 0) {
      result.style.color = "var(--ink-faint)";
      result.textContent = "No word pairs detected in that text.";
      return;
    }
    result.style.color = "var(--ink-faint)";
    result.textContent = "Importing…";
    const added = await importPairs(pairs);
    result.style.color = "var(--correct)";
    result.textContent = `Added ${added} new word${added === 1 ? "" : "s"} (${pairs.length - added} already existed).`;
    document.getElementById("importText").value = "";
  });
}

// ---------- Words ----------
let selectModeActive = false;
let selectedWordIds = new Set();

async function renderWordsPanel() {
  const words = await fetchAllWords();
  const dueCount = words.filter(isDue).length;
  const mastered = words.filter(w => (w.box || 1) >= 5).length;
  const leeches = words.filter(isLeech).sort((a, b) => (b.failCount || 0) - (a.failCount || 0));
  selectedWordIds = new Set(); // reset selection whenever the panel re-renders

  wordsPanel.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="num">${words.length}</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="num">${dueCount}</div><div class="label">Due now</div></div>
      <div class="stat-card"><div class="num">${mastered}</div><div class="label">Mastered</div></div>
      <div class="stat-card"><div class="num">${leeches.length}</div><div class="label">Struggling</div></div>
    </div>
    ${leeches.length > 0 ? `
      <div class="section-title">Struggling words</div>
      <div class="word-list" id="leechListEl" style="margin-bottom:28px;"></div>
    ` : ""}
    <div style="display:flex; justify-content:space-between; align-items:center; margin:8px 0 12px;">
      <div class="section-title" style="margin:0;">All words</div>
      <span class="ignore-link" id="selectModeToggle">${selectModeActive ? "Cancel" : "Select"}</span>
    </div>
    <div id="bulkActionsBar" style="display:none; margin-bottom:12px;"></div>
    <div class="word-list" id="wordListEl"></div>
  `;

  function buildRow(w, selectable) {
    const row = document.createElement("div");
    row.className = "word-row";
    let badge = `<span class="box-badge">box ${w.box || 1}</span>`;
    if (isLeech(w)) badge = `<span class="box-badge" style="color:var(--wrong); border:1px solid var(--wrong-soft);">⚠ ${w.failCount}× missed</span>`;
    if (w.ignored) badge = `<span class="box-badge" style="color:var(--ink-faint);">known</span>`;

    const checkboxHtml = selectable
      ? `<input type="checkbox" class="word-select-checkbox" data-id="${w.id}" style="margin-right:10px; width:18px; height:18px; accent-color:var(--accent); flex-shrink:0;" />`
      : "";

    row.innerHTML = `
      ${checkboxHtml}
      <div class="pair"><span class="en">${w.english}</span><span class="hy">${w.armenian}</span></div>
      ${badge}
    `;
    if (w.ignored) row.style.opacity = "0.55";

    if (selectable) {
      const checkbox = row.querySelector(".word-select-checkbox");
      checkbox.addEventListener("click", e => e.stopPropagation());
      checkbox.addEventListener("change", () => {
        if (checkbox.checked) selectedWordIds.add(w.id);
        else selectedWordIds.delete(w.id);
        updateBulkActionsBar();
      });
      row.addEventListener("click", () => { checkbox.checked = !checkbox.checked; checkbox.dispatchEvent(new Event("change")); });
    } else {
      row.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelector('.tab[data-tab="practice"]').classList.add("active");
        Object.entries(panels).forEach(([key, el]) => { el.style.display = key === "practice" ? "block" : "none"; });
        renderPracticeDetail(w);
      });
    }
    return row;
  }

  function updateBulkActionsBar() {
    const bar = document.getElementById("bulkActionsBar");
    if (!selectModeActive) { bar.style.display = "none"; return; }
    bar.style.display = "block";
    const count = selectedWordIds.size;
    bar.innerHTML = `
      <button class="btn" id="bulkDeleteBtn" style="background:var(--wrong); color:var(--bg);" ${count === 0 ? "disabled" : ""}>
        Delete ${count > 0 ? count : ""} selected
      </button>
      <div id="bulkDeleteConfirm" style="margin-top:10px;"></div>
    `;
    document.getElementById("bulkDeleteBtn").addEventListener("click", () => {
      const confirmEl = document.getElementById("bulkDeleteConfirm");
      confirmEl.innerHTML = `
        <div style="font-size:13px; color:var(--ink-soft); margin-bottom:10px;">Delete ${count} word${count === 1 ? "" : "s"}? This can't be undone.</div>
        <div style="display:flex; gap:10px;">
          <button class="btn" id="confirmBulkDeleteBtn" style="flex:1; background:var(--wrong); color:var(--bg);">Delete permanently</button>
          <button class="btn btn-ghost" id="cancelBulkDeleteBtn" style="flex:1;">Cancel</button>
        </div>
      `;
      document.getElementById("cancelBulkDeleteBtn").addEventListener("click", () => { confirmEl.innerHTML = ""; });
      document.getElementById("confirmBulkDeleteBtn").addEventListener("click", async () => {
        const ids = [...selectedWordIds];
        for (const id of ids) {
          await deleteDoc(doc(db, "words", id));
        }
        renderWordsPanel();
      });
    });
  }

  document.getElementById("selectModeToggle").addEventListener("click", () => {
    selectModeActive = !selectModeActive;
    renderWordsPanel();
  });

  if (leeches.length > 0) {
    const leechListEl = document.getElementById("leechListEl");
    leeches.forEach(w => leechListEl.appendChild(buildRow(w, selectModeActive)));
  }

  const listEl = document.getElementById("wordListEl");
  if (words.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="small">No words yet — they'll show up here once captured or imported.</div></div>`;
    return;
  }

  words
    .sort((a, b) => (a.english || "").localeCompare(b.english || ""))
    .forEach(w => listEl.appendChild(buildRow(w, selectModeActive)));

  updateBulkActionsBar();
}

// ---------- Auth gating ----------
const loginScreen = document.getElementById("loginScreen");
const mainApp = document.getElementById("mainApp");

async function startApp() {
  mainApp.style.display = "block";
  loginScreen.style.display = "none";
  await renderStreak();
  await loadQueue();
  await renderQuiz();
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    startApp();
  } else {
    mainApp.style.display = "none";
    loginScreen.style.display = "block";
  }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errorEl = document.getElementById("loginError");
  errorEl.textContent = "";
  if (!email || !password) {
    errorEl.textContent = "Enter both email and password.";
    return;
  }
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    errorEl.textContent = "Sign in failed — check your email and password.";
  }
});

document.getElementById("loginPassword").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
});

document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
</script>
