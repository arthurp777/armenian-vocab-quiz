<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reruns — Armenian Vocab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16171d;
    --surface: #21232b;
    --surface-2: #2a2d38;
    --subtitle: #f2c14e;
    --correct: #4a9d6e;
    --wrong: #d64545;
    --fog: #9a9aa6;
    --fog-dim: #6b6c78;
    --white: #f4f3ef;
    --border: #34374420;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 24px 16px 64px;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  /* ---------- Header / episode strip ---------- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .logo {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .logo span { color: var(--subtitle); }

  .streak-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fog);
  }
  .streak-pill .count { color: var(--subtitle); font-weight: 700; }

  .episode-strip {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
  }
  .ep-mark {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--surface);
  }
  .ep-mark.done { background: var(--subtitle); }
  .ep-mark.today { background: var(--surface-2); border: 1.5px solid var(--subtitle); height: 5px; }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    color: var(--fog);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
  }
  .tab.active {
    background: var(--surface-2);
    color: var(--white);
  }

  /* ---------- Quiz frame (the "paused video") ---------- */
  .frame {
    background: linear-gradient(160deg, #1b1c23, #131418);
    border-radius: 18px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
    margin-bottom: 20px;
  }
  .letterbox {
    height: 18px;
    background: #0d0e11;
  }
  .frame-inner {
    padding: 48px 32px 36px;
    text-align: center;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .progress-label {
    font-size: 12px;
    color: var(--fog-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 18px;
    font-weight: 600;
  }

  .subtitle-word {
    font-family: 'Noto Sans Armenian', 'Archivo Expanded', sans-serif;
    font-weight: 700;
    font-size: 40px;
    color: var(--subtitle);
    text-shadow: 0 2px 18px rgba(242,193,78,0.25);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .subtitle-direction {
    font-size: 12px;
    color: var(--fog-dim);
    font-weight: 500;
  }

  .answer-row {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    width: 100%;
  }
  .answer-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .answer-input:focus { border-color: var(--subtitle); }
  .answer-input.correct { border-color: var(--correct); }
  .answer-input.wrong { border-color: var(--wrong); }

  .submit-btn {
    background: var(--subtitle);
    color: #1a1505;
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  .submit-btn:hover { transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; }

  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-top: 22px;
  }
  .mc-option {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 12px;
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    cursor: pointer;
    text-align: center;
    transition: all 0.12s ease;
  }
  .mc-option:hover { background: var(--surface-2); }
  .mc-option.correct { border-color: var(--correct); background: rgba(74,157,110,0.15); }
  .mc-option.wrong { border-color: var(--wrong); background: rgba(214,69,69,0.15); }
  .mc-option.disabled { pointer-events: none; }

  .feedback {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  .next-btn {
    margin-top: 14px;
    background: transparent;
    border: 1.5px solid var(--surface-2);
    color: var(--fog);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .next-btn:hover { border-color: var(--subtitle); color: var(--subtitle); }

  /* ---------- Empty / done states ---------- */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--fog);
  }
  .empty-state .big { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
  .empty-state .small { font-size: 13px; line-height: 1.5; }

  /* ---------- Import box ---------- */
  .import-box textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    outline: none;
    margin-bottom: 12px;
  }
  .import-box .hint {
    font-size: 12px;
    color: var(--fog-dim);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .import-result {
    margin-top: 14px;
    font-size: 13px;
    color: var(--correct);
    font-weight: 600;
  }

  /* ---------- Word list ---------- */
  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
  }
  .word-row .pair { display: flex; gap: 10px; align-items: baseline; }
  .word-row .en { font-weight: 600; }
  .word-row .hy { color: var(--subtitle); font-family: 'Noto Sans Armenian', sans-serif; }
  .word-row .box-badge {
    font-size: 11px;
    color: var(--fog-dim);
    background: var(--surface-2);
    border-radius: 6px;
    padding: 3px 8px;
    font-weight: 600;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fog-dim);
    margin: 20px 0 10px;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-card .num { font-size: 24px; font-weight: 800; font-family: 'Archivo Expanded', sans-serif; color: var(--subtitle); }
  .stat-card .label { font-size: 11px; color: var(--fog-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

  .config-note {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px;
    font-size: 12px;
    color: var(--fog-dim);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .config-note code { color: var(--subtitle); }

  @media (max-width: 420px) {
    .subtitle-word { font-size: 30px; }
    .mc-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">re<span>runs</span></div>
    <div class="streak-pill">📺 <span class="count" id="streakCount">0</span> day series</div>
  </div>

  <div class="episode-strip" id="episodeStrip"></div>

  <div class="tabs">
    <div class="tab active" data-tab="quiz">Quiz</div>
    <div class="tab" data-tab="import">Import</div>
    <div class="tab" data-tab="words">Words</div>
  </div>

  <div id="quizPanel"></div>
  <div id="importPanel" style="display:none;"></div>
  <div id="wordsPanel" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, updateDoc, addDoc, setDoc, getDoc,
  query, where, Timestamp, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ===== CONFIG: paste your Firebase config here =====
const firebaseConfig = {
  apiKey: "AIzaSyDmszsxVjsgoiyad2C0Zb4fgGJmhU8uK_g",
  authDomain: "armenian-vocab.firebaseapp.com",
  projectId: "armenian-vocab",
  storageBucket: "armenian-vocab.firebasestorage.app",
  messagingSenderId: "535107629746",
  appId: "1:535107629746:web:9553753bb81bf0333b8fab"
};
// =====================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsRef = collection(db, "words");

// ---------- Local streak tracking (stored in Firestore as a single doc) ----------
const META_DOC_ID = "streak_meta";

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function daysBetween(a, b) {
  const d1 = new Date(a + "T00:00:00Z");
  const d2 = new Date(b + "T00:00:00Z");
  return Math.round((d2 - d1) / 86400000);
}

async function getStreakMeta() {
  const ref = doc(db, "meta", META_DOC_ID);
  const snap = await getDoc(ref);
  if (snap.exists()) return snap.data();
  return { streak: 0, lastCompletedDate: null, history: [] };
}

async function recordSessionComplete() {
  const ref = doc(db, "meta", META_DOC_ID);
  const meta = await getStreakMeta();
  const today = todayStr();
  if (meta.lastCompletedDate === today) return meta; // already counted today

  let newStreak = 1;
  if (meta.lastCompletedDate) {
    const gap = daysBetween(meta.lastCompletedDate, today);
    if (gap === 1) newStreak = (meta.streak || 0) + 1;
    else if (gap === 0) newStreak = meta.streak || 1;
    else newStreak = 1; // streak broken
  }
  const history = (meta.history || []).concat([today]).slice(-30);
  const updated = { streak: newStreak, lastCompletedDate: today, history };
  await setDoc(ref, updated, { merge: true });
  return updated;
}

// ---------- Word helpers ----------
function boxIntervalDays(box) {
  // Leitner-style spacing: higher box = reviewed less often
  const map = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 16 };
  return map[box] ?? 0;
}

function isDue(word) {
  if (!word.nextReview) return true;
  const nextReview = word.nextReview.toDate ? word.nextReview.toDate() : new Date(word.nextReview);
  return nextReview <= new Date();
}

async function fetchAllWords() {
  const snap = await getDocs(wordsRef);
  const list = [];
  snap.forEach(d => list.push({ id: d.id, ...d.data() }));
  return list;
}

async function updateWordAfterAnswer(word, correct) {
  const ref = doc(db, "words", word.id);
  let newBox = word.box || 1;
  let newCorrectStreak = word.correctStreak || 0;

  if (correct) {
    newBox = Math.min(5, newBox + 1);
    newCorrectStreak += 1;
  } else {
    newBox = 1;
    newCorrectStreak = 0;
  }

  const days = boxIntervalDays(newBox);
  const next = new Date();
  next.setDate(next.getDate() + days);

  await updateDoc(ref, {
    box: newBox,
    correctStreak: newCorrectStreak,
    lastReviewed: Timestamp.fromDate(new Date()),
    nextReview: Timestamp.fromDate(next)
  });
}

// ---------- App state ----------
let allWords = [];
let dueQueue = [];
let currentIndex = 0;
let sessionTotal = 0;
let sessionDone = 0;

const quizPanel = document.getElementById("quizPanel");
const importPanel = document.getElementById("importPanel");
const wordsPanel = document.getElementById("wordsPanel");

// ---------- Tabs ----------
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const target = tab.dataset.tab;
    quizPanel.style.display = target === "quiz" ? "block" : "none";
    importPanel.style.display = target === "import" ? "block" : "none";
    wordsPanel.style.display = target === "words" ? "block" : "none";
    if (target === "words") renderWordsPanel();
    if (target === "import") renderImportPanel();
  });
});

// ---------- Episode strip + streak ----------
async function renderStreak() {
  const meta = await getStreakMeta();
  document.getElementById("streakCount").textContent = meta.streak || 0;

  const strip = document.getElementById("episodeStrip");
  strip.innerHTML = "";
  const history = meta.history || [];
  const today = todayStr();
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const mark = document.createElement("div");
    mark.className = "ep-mark";
    if (history.includes(ds)) mark.classList.add("done");
    else if (ds === today) mark.classList.add("today");
    strip.appendChild(mark);
  }
}

// ---------- Quiz rendering ----------
function pickQuestionType(word) {
  // Always require typing the answer, per user preference - typing reinforces recall better than picking
  return "type";
}

function buildDistractors(correctWord, pool, count = 3) {
  const others = pool.filter(w => w.id !== correctWord.id && w.english.toLowerCase() !== correctWord.english.toLowerCase());
  const shuffled = others.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(w => w.english);
}

async function loadQueue() {
  allWords = await fetchAllWords();
  dueQueue = allWords.filter(isDue);
  // Shuffle
  dueQueue = dueQueue.sort(() => Math.random() - 0.5);
  sessionTotal = dueQueue.length;
  sessionDone = 0;
  currentIndex = 0;
}

function renderEmptyState(message, sub) {
  quizPanel.innerHTML = `
    <div class="frame">
      <div class="letterbox"></div>
      <div class="frame-inner">
        <div class="empty-state">
          <div class="big">${message}</div>
          <div class="small">${sub}</div>
        </div>
      </div>
      <div class="letterbox"></div>
    </div>
  `;
}

async function renderQuiz() {
  if (allWords.length === 0) {
    renderEmptyState("No words yet", "Translate something English → Armenian on translate.google.com (with the extension installed), or paste your phone history in the Import tab.");
    return;
  }

  if (currentIndex >= dueQueue.length) {
    if (sessionDone > 0) {
      await recordSessionComplete();
      await renderStreak();
    }
    renderEmptyState(
      sessionDone > 0 ? "Episode complete 🎬" : "All caught up",
      sessionDone > 0
        ? `You reviewed ${sessionDone} word${sessionDone === 1 ? "" : "s"}. Come back tomorrow for the next one.`
        : "No words are due for review right now. Check back later."
    );
    return;
  }

  const word = dueQueue[currentIndex];
  const qType = pickQuestionType(word);

  quizPanel.innerHTML = `
    <div class="frame">
      <div class="letterbox"></div>
      <div class="frame-inner">
        <div class="progress-label">Word ${currentIndex + 1} of ${dueQueue.length}</div>
        <div class="subtitle-word">${word.armenian}</div>
        <div class="subtitle-direction">type the English translation</div>
        <div id="answerArea" style="width:100%;"></div>
        <div class="feedback" id="feedback"></div>
      </div>
      <div class="letterbox"></div>
    </div>
  `;

  const answerArea = document.getElementById("answerArea");
  const feedback = document.getElementById("feedback");

  if (qType === "mc") {
    const distractors = buildDistractors(word, allWords, 3);
    const options = [word.english, ...distractors].sort(() => Math.random() - 0.5);

    const grid = document.createElement("div");
    grid.className = "mc-grid";
    options.forEach(opt => {
      const btn = document.createElement("div");
      btn.className = "mc-option";
      btn.textContent = opt;
      btn.addEventListener("click", async () => {
        const correct = opt.toLowerCase() === word.english.toLowerCase();
        document.querySelectorAll(".mc-option").forEach(o => {
          o.classList.add("disabled");
          if (o.textContent.toLowerCase() === word.english.toLowerCase()) o.classList.add("correct");
          else if (o === btn && !correct) o.classList.add("wrong");
        });
        await handleAnswer(word, correct, feedback, answerArea);
      });
      grid.appendChild(btn);
    });
    answerArea.appendChild(grid);
  } else {
    const row = document.createElement("div");
    row.className = "answer-row";
    row.innerHTML = `
      <input type="text" class="answer-input" id="typeInput" placeholder="Type in English…" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="submit-btn" id="submitBtn">Check</button>
    `;
    answerArea.appendChild(row);

    const input = document.getElementById("typeInput");
    const submitBtn = document.getElementById("submitBtn");
    input.focus();

    const submit = async () => {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      const correct = val === word.english.toLowerCase();
      input.classList.add(correct ? "correct" : "wrong");
      input.disabled = true;
      submitBtn.disabled = true;
      await handleAnswer(word, correct, feedback, answerArea);
    };

    submitBtn.addEventListener("click", submit);
    input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  }
}

async function handleAnswer(word, correct, feedback, answerArea) {
  feedback.textContent = correct ? "Correct!" : `Not quite — it means "${word.english}"`;
  feedback.className = "feedback " + (correct ? "correct" : "wrong");

  await updateWordAfterAnswer(word, correct);
  sessionDone++;

  const nextBtn = document.createElement("button");
  nextBtn.className = "next-btn";
  nextBtn.textContent = "Next →";
  nextBtn.addEventListener("click", () => {
    currentIndex++;
    renderQuiz();
  });
  answerArea.appendChild(nextBtn);

  // Update local copy so multiple-choice distractor pool stays roughly fresh
  const idx = allWords.findIndex(w => w.id === word.id);
  if (idx >= 0) allWords[idx] = { ...allWords[idx], box: correct ? Math.min(5, (word.box||1)+1) : 1 };
}

// ---------- Import panel ----------
function parseImportText(raw) {
  // Heuristic parser for pasted Google Activity / history text.
  // Looks for lines or pairs like "headache" / "գլխացավ" appearing close together.
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const pairs = [];

  const isShort = (s) => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 3) return false;
    if (/[.!?]\s*$/.test(s.trim())) return false;
    return true;
  };
  const isArmenian = (s) => /[\u0530-\u058F]/.test(s);
  const isEnglish = (s) => /^[a-zA-Z\s'-]+$/.test(s);

  for (let i = 0; i < lines.length - 1; i++) {
    const a = lines[i];
    const b = lines[i + 1];
    if (!isShort(a) || !isShort(b)) continue;
    if (isEnglish(a) && isArmenian(b)) {
      pairs.push({ english: a, armenian: b });
    } else if (isArmenian(a) && isEnglish(b)) {
      pairs.push({ english: b, armenian: a });
    }
  }
  return pairs;
}

async function importPairs(pairs) {
  const existing = await fetchAllWords();
  const existingLower = new Set(existing.map(w => (w.english || "").toLowerCase()));
  let added = 0;

  for (const pair of pairs) {
    const key = pair.english.toLowerCase();
    if (existingLower.has(key)) continue;
    existingLower.add(key);
    const now = Timestamp.fromDate(new Date());
    await addDoc(wordsRef, {
      english: pair.english,
      english_lower: key,
      armenian: pair.armenian,
      box: 1,
      correctStreak: 0,
      lastReviewed: null,
      nextReview: now,
      createdAt: now
    });
    added++;
  }
  return added;
}

function renderImportPanel() {
  importPanel.innerHTML = `
    <div class="import-box">
      <div class="hint">
        Paste copied text from your Google Translate app history (myactivity.google.com → search "Translate").
        Word pairs are detected automatically — entries longer than 3 words or ending in punctuation are skipped.
        No review step: matching pairs are added straight away.
      </div>
      <textarea id="importText" placeholder="Paste your copied history here…"></textarea>
      <button class="submit-btn" id="importBtn" style="width:100%; padding:14px 0;">Import words</button>
      <div class="import-result" id="importResult"></div>
    </div>
  `;
  document.getElementById("importBtn").addEventListener("click", async () => {
    const raw = document.getElementById("importText").value;
    const pairs = parseImportText(raw);
    const result = document.getElementById("importResult");
    if (pairs.length === 0) {
      result.style.color = "var(--fog-dim)";
      result.textContent = "No word pairs detected in that text.";
      return;
    }
    result.style.color = "var(--fog-dim)";
    result.textContent = "Importing…";
    const added = await importPairs(pairs);
    result.style.color = "var(--correct)";
    result.textContent = `Added ${added} new word${added === 1 ? "" : "s"} (${pairs.length - added} were already in your list).`;
    document.getElementById("importText").value = "";
  });
}

// ---------- Words panel ----------
async function renderWordsPanel() {
  const words = await fetchAllWords();
  const dueCount = words.filter(isDue).length;
  const mastered = words.filter(w => (w.box || 1) >= 5).length;

  wordsPanel.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="num">${words.length}</div><div class="label">Total words</div></div>
      <div class="stat-card"><div class="num">${dueCount}</div><div class="label">Due now</div></div>
      <div class="stat-card"><div class="num">${mastered}</div><div class="label">Mastered</div></div>
    </div>
    <div class="section-title">All words</div>
    <div class="word-list" id="wordListEl"></div>
  `;

  const listEl = document.getElementById("wordListEl");
  if (words.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="small">No words yet — they'll show up here once captured or imported.</div></div>`;
    return;
  }

  words
    .sort((a, b) => (a.english || "").localeCompare(b.english || ""))
    .forEach(w => {
      const row = document.createElement("div");
      row.className = "word-row";
      row.innerHTML = `
        <div class="pair"><span class="en">${w.english}</span><span class="hy">${w.armenian}</span></div>
        <span class="box-badge">box ${w.box || 1}</span>
      `;
      listEl.appendChild(row);
    });
}

// ---------- Init ----------
(async function init() {
  await renderStreak();
  await loadQueue();
  await renderQuiz();
})();
</script>
