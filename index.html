<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reruns — Armenian Vocab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Armenian:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --ink: #1c1c1a;
    --ink-soft: #55554f;
    --ink-faint: #a3a299;
    --line: #e4e2dc;
    --surface: #f2f0ea;
    --accent: #c98a2c;
    --accent-soft: #f6e8d2;
    --correct: #3f7d5c;
    --correct-soft: #e3efe7;
    --wrong: #b8453a;
    --wrong-soft: #f6e6e3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 40px 20px 80px;
  }

  .app { width: 100%; max-width: 600px; }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .streak-line {
    font-size: 13px;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .streak-line .count { color: var(--accent); font-weight: 700; }

  .episode-strip {
    display: flex;
    gap: 3px;
    margin: 18px 0 32px;
  }
  .ep-mark { flex: 1; height: 3px; background: var(--line); border-radius: 2px; }
  .ep-mark.done { background: var(--accent); }
  .ep-mark.today { background: var(--accent-soft); border: 1px solid var(--accent); height: 2px; }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    gap: 22px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 0 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-faint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    user-select: none;
    transition: color 0.15s ease;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--ink); }

  /* ---------- Quiz card ---------- */
  .quiz-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 56px 36px 40px;
    text-align: center;
    background: #fff;
  }
  .progress-label {
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 22px;
    font-weight: 600;
  }
  .subtitle-word {
    font-family: 'Noto Sans Armenian', sans-serif;
    font-weight: 600;
    font-size: 38px;
    color: var(--ink);
    margin-bottom: 8px;
    word-break: break-word;
    line-height: 1.2;
  }
  .subtitle-direction {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .answer-row { display: flex; gap: 10px; margin-top: 26px; width: 100%; }
  .answer-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--correct); background: var(--correct-soft); }
  .answer-input.wrong { border-color: var(--wrong); background: var(--wrong-soft); }

  .btn {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 22px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s ease;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn-block { width: 100%; padding: 13px 0; }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--ink-soft);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
  .btn-accent { background: var(--accent); }

  .feedback { margin-top: 18px; font-size: 14px; font-weight: 600; min-height: 20px; }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  .next-btn { margin-top: 16px; }

  /* ---------- Empty state ---------- */
  .empty-state { text-align: center; padding: 30px 10px; color: var(--ink-soft); }
  .empty-state .big {
    font-family: 'Source Serif 4', serif;
    font-size: 19px; font-weight: 600; color: var(--ink); margin-bottom: 8px;
  }
  .empty-state .small { font-size: 13px; line-height: 1.6; color: var(--ink-faint); max-width: 360px; margin: 0 auto; }

  /* ---------- Import ---------- */
  .import-box textarea {
    width: 100%;
    min-height: 150px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    outline: none;
    margin-bottom: 12px;
  }
  .import-box textarea:focus { border-color: var(--accent); }
  .import-box .hint { font-size: 12.5px; color: var(--ink-faint); margin-bottom: 16px; line-height: 1.6; }
  .import-result { margin-top: 14px; font-size: 13px; color: var(--correct); font-weight: 600; }

  /* ---------- Stats ---------- */
  .stats-row { display: flex; gap: 1px; margin-bottom: 28px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .stat-card { flex: 1; padding: 16px 8px; text-align: center; background: #fff; }
  .stat-card + .stat-card { border-left: 1px solid var(--line); }
  .stat-card .num {
    font-family: 'Source Serif 4', serif;
    font-size: 26px; font-weight: 700; color: var(--ink);
  }
  .stat-card .label { font-size: 10.5px; color: var(--ink-faint); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-faint);
    margin: 8px 0 12px;
  }

  /* ---------- Search ---------- */
  .search-input {
    width: 100%;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 18px;
  }
  .search-input:focus { border-color: var(--accent); }

  /* ---------- Word list ---------- */
  .word-list { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .word-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 13px 16px;
    font-size: 14px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .word-row:hover { background: var(--surface); }
  .word-row .pair { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; min-width: 0; }
  .word-row .en { font-weight: 600; }
  .word-row .hy { color: var(--accent); font-family: 'Noto Sans Armenian', sans-serif; font-weight: 500; }
  .word-row .box-badge {
    font-size: 10.5px; color: var(--ink-faint); background: var(--surface);
    border-radius: 6px; padding: 3px 8px; font-weight: 600; flex-shrink: 0;
  }

  /* ---------- Practice detail panel ---------- */
  .practice-detail {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 32px 28px;
    background: #fff;
    margin-bottom: 18px;
  }
  .practice-detail .back-link {
    font-size: 13px;
    color: var(--ink-faint);
    cursor: pointer;
    margin-bottom: 20px;
    display: inline-block;
    font-weight: 600;
  }
  .practice-detail .back-link:hover { color: var(--accent); }
  .practice-pair { text-align: center; margin-bottom: 24px; }
  .practice-pair .hy-word {
    font-family: 'Noto Sans Armenian', sans-serif;
    font-size: 30px; font-weight: 600; color: var(--ink); margin-bottom: 4px;
  }
  .practice-pair .en-word { font-size: 15px; color: var(--ink-faint); font-weight: 500; }

  .sentence-block {
    border-top: 1px solid var(--line);
    padding-top: 20px;
    margin-top: 20px;
  }
  .sentence-en { font-size: 15px; color: var(--ink); margin-bottom: 6px; line-height: 1.5; }
  .sentence-hy { font-family: 'Noto Sans Armenian', sans-serif; font-size: 15px; color: var(--accent); line-height: 1.5; }
  .sentence-loading { font-size: 13px; color: var(--ink-faint); }
  .sentence-error { font-size: 13px; color: var(--wrong); }

  .practice-actions { display: flex; gap: 10px; margin-top: 22px; }

  @media (max-width: 460px) {
    .subtitle-word { font-size: 28px; }
    .quiz-card { padding: 40px 22px 30px; }
    .tabs { gap: 14px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">reruns</div>
    <div class="streak-line"><span class="count" id="streakCount">0</span> day series</div>
  </div>

  <div class="episode-strip" id="episodeStrip"></div>

  <div class="tabs">
    <div class="tab active" data-tab="quiz">Quiz</div>
    <div class="tab" data-tab="practice">Practice</div>
    <div class="tab" data-tab="words">Words</div>
    <div class="tab" data-tab="import">Import</div>
  </div>

  <div id="quizPanel"></div>
  <div id="practicePanel" style="display:none;"></div>
  <div id="wordsPanel" style="display:none;"></div>
  <div id="importPanel" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, addDoc, setDoc, getDoc,
  updateDoc, deleteDoc, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ===== CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyDmszsxVjsgoiyad2C0Zb4fgGJmhU8uK_g",
  authDomain: "armenian-vocab.firebaseapp.com",
  projectId: "armenian-vocab",
  storageBucket: "armenian-vocab.firebasestorage.app",
  messagingSenderId: "535107629746",
  appId: "1:535107629746:web:9553753bb81bf0333b8fab"
};
// ===================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsRef = collection(db, "words");

const META_DOC_ID = "streak_meta";

function todayStr() { return new Date().toISOString().slice(0, 10); }
function daysBetween(a, b) {
  const d1 = new Date(a + "T00:00:00Z");
  const d2 = new Date(b + "T00:00:00Z");
  return Math.round((d2 - d1) / 86400000);
}

async function getStreakMeta() {
  const ref = doc(db, "meta", META_DOC_ID);
  const snap = await getDoc(ref);
  if (snap.exists()) return snap.data();
  return { streak: 0, lastCompletedDate: null, history: [] };
}

async function recordSessionComplete() {
  const ref = doc(db, "meta", META_DOC_ID);
  const meta = await getStreakMeta();
  const today = todayStr();
  if (meta.lastCompletedDate === today) return meta;

  let newStreak = 1;
  if (meta.lastCompletedDate) {
    const gap = daysBetween(meta.lastCompletedDate, today);
    if (gap === 1) newStreak = (meta.streak || 0) + 1;
    else if (gap === 0) newStreak = meta.streak || 1;
    else newStreak = 1;
  }
  const history = (meta.history || []).concat([today]).slice(-30);
  const updated = { streak: newStreak, lastCompletedDate: today, history };
  await setDoc(ref, updated, { merge: true });
  return updated;
}

function boxIntervalDays(box) {
  const map = { 1: 0, 2: 1, 3: 3, 4: 7, 5: 16 };
  return map[box] ?? 0;
}

function isDue(word) {
  if (!word.nextReview) return true;
  const nextReview = word.nextReview.toDate ? word.nextReview.toDate() : new Date(word.nextReview);
  return nextReview <= new Date();
}

async function fetchAllWords() {
  const snap = await getDocs(wordsRef);
  const list = [];
  snap.forEach(d => list.push({ id: d.id, ...d.data() }));
  return list;
}

async function updateWordAfterAnswer(word, correct) {
  const ref = doc(db, "words", word.id);
  let newBox = word.box || 1;
  let newCorrectStreak = word.correctStreak || 0;

  if (correct) { newBox = Math.min(5, newBox + 1); newCorrectStreak += 1; }
  else { newBox = 1; newCorrectStreak = 0; }

  const days = boxIntervalDays(newBox);
  const next = new Date();
  next.setDate(next.getDate() + days);

  await updateDoc(ref, {
    box: newBox,
    correctStreak: newCorrectStreak,
    lastReviewed: Timestamp.fromDate(new Date()),
    nextReview: Timestamp.fromDate(next)
  });
}

// ---------- State ----------
let allWords = [];
let dueQueue = [];
let currentIndex = 0;
let sessionDone = 0;

const quizPanel = document.getElementById("quizPanel");
const practicePanel = document.getElementById("practicePanel");
const wordsPanel = document.getElementById("wordsPanel");
const importPanel = document.getElementById("importPanel");

const panels = { quiz: quizPanel, practice: practicePanel, words: wordsPanel, import: importPanel };

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const target = tab.dataset.tab;
    Object.entries(panels).forEach(([key, el]) => { el.style.display = key === target ? "block" : "none"; });
    if (target === "words") renderWordsPanel();
    if (target === "import") renderImportPanel();
    if (target === "practice") renderPracticeList();
  });
});

async function renderStreak() {
  const meta = await getStreakMeta();
  document.getElementById("streakCount").textContent = meta.streak || 0;
  const strip = document.getElementById("episodeStrip");
  strip.innerHTML = "";
  const history = meta.history || [];
  const today = todayStr();
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const mark = document.createElement("div");
    mark.className = "ep-mark";
    if (history.includes(ds)) mark.classList.add("done");
    else if (ds === today) mark.classList.add("today");
    strip.appendChild(mark);
  }
}

async function loadQueue() {
  allWords = await fetchAllWords();
  dueQueue = allWords.filter(isDue).sort(() => Math.random() - 0.5);
  sessionDone = 0;
  currentIndex = 0;
}

function renderEmptyState(container, message, sub) {
  container.innerHTML = `
    <div class="quiz-card">
      <div class="empty-state">
        <div class="big">${message}</div>
        <div class="small">${sub}</div>
      </div>
    </div>
  `;
}

async function renderQuiz() {
  if (allWords.length === 0) {
    renderEmptyState(quizPanel, "No words yet", "Translate something English → Armenian on translate.google.com with the extension installed, or paste your phone history in the Import tab.");
    return;
  }
  if (currentIndex >= dueQueue.length) {
    if (sessionDone > 0) { await recordSessionComplete(); await renderStreak(); }
    renderEmptyState(
      quizPanel,
      sessionDone > 0 ? "Episode complete" : "All caught up",
      sessionDone > 0
        ? `You reviewed ${sessionDone} word${sessionDone === 1 ? "" : "s"}. Come back tomorrow for the next one — or visit Practice to drill any word anytime.`
        : "No words are due for review right now. Visit Practice if you'd like to drill any word anyway."
    );
    return;
  }

  const word = dueQueue[currentIndex];
  quizPanel.innerHTML = `
    <div class="quiz-card">
      <div class="progress-label">Word ${currentIndex + 1} of ${dueQueue.length}</div>
      <div class="subtitle-word">${word.armenian}</div>
      <div class="subtitle-direction">type the English translation</div>
      <div id="answerArea" style="width:100%;"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;
  wireTypingQuestion(word, document.getElementById("answerArea"), document.getElementById("feedback"), async () => {
    sessionDone++;
    currentIndex++;
    renderQuiz();
  });
}

function wireTypingQuestion(word, answerArea, feedback, onNext) {
  const row = document.createElement("div");
  row.className = "answer-row";
  row.innerHTML = `
    <input type="text" class="answer-input" id="typeInput" placeholder="Type in English…" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <button class="btn" id="submitBtn">Check</button>
  `;
  answerArea.appendChild(row);
  const input = document.getElementById("typeInput");
  const submitBtn = document.getElementById("submitBtn");
  input.focus();

  const submit = async () => {
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    const correct = val === word.english.toLowerCase();
    input.classList.add(correct ? "correct" : "wrong");
    input.disabled = true;
    submitBtn.disabled = true;

    feedback.textContent = correct ? "Correct" : `Not quite — it means "${word.english}"`;
    feedback.className = "feedback " + (correct ? "correct" : "wrong");

    await updateWordAfterAnswer(word, correct);
    const idx = allWords.findIndex(w => w.id === word.id);
    if (idx >= 0) allWords[idx] = { ...allWords[idx], box: correct ? Math.min(5, (word.box||1)+1) : 1 };

    const nextBtn = document.createElement("button");
    nextBtn.className = "btn btn-ghost next-btn";
    nextBtn.textContent = "Next →";
    nextBtn.addEventListener("click", onNext);
    answerArea.appendChild(nextBtn);
  };

  submitBtn.addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

// ---------- Practice ----------
async function renderPracticeList() {
  allWords = await fetchAllWords();
  practicePanel.innerHTML = `
    <input type="text" class="search-input" id="practiceSearch" placeholder="Search words…" />
    <div class="word-list" id="practiceListEl"></div>
  `;
  const listEl = document.getElementById("practiceListEl");

  function draw(filter = "") {
    const f = filter.trim().toLowerCase();
    const filtered = allWords
      .filter(w => !f || w.english.toLowerCase().includes(f) || (w.armenian || "").includes(f))
      .sort((a, b) => (a.english || "").localeCompare(b.english || ""));

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="small">No words match.</div></div>`;
      return;
    }
    listEl.innerHTML = "";
    filtered.forEach(w => {
      const row = document.createElement("div");
      row.className = "word-row";
      row.innerHTML = `
        <div class="pair"><span class="en">${w.english}</span><span class="hy">${w.armenian}</span></div>
        <span class="box-badge">box ${w.box || 1}</span>
      `;
      row.addEventListener("click", () => renderPracticeDetail(w));
      listEl.appendChild(row);
    });
  }

  draw();
  document.getElementById("practiceSearch").addEventListener("input", e => draw(e.target.value));
}

// ---------- Example sentence generator (offline, template-based, no API calls) ----------
const SENTENCE_TEMPLATES = [
  (w) => `Can you explain what "${w}" means?`,
  (w) => `I heard the word "${w}" in the show and had to look it up.`,
  (w) => `She used "${w}" twice in that conversation.`,
  (w) => `That's a good example of how to use "${w}".`,
  (w) => `I'm not sure I'm using "${w}" correctly here.`,
  (w) => `The subtitles translated it as "${w}".`,
  (w) => `He said something about "${w}" earlier.`,
  (w) => `Try to use "${w}" in a sentence of your own.`,
  (w) => `I keep forgetting what "${w}" means.`,
  (w) => `That word, "${w}", came up again in the next episode.`
];

function generateExampleSentence(word) {
  const template = SENTENCE_TEMPLATES[Math.floor(Math.random() * SENTENCE_TEMPLATES.length)];
  return { en: template(word.english) };
}

function renderPracticeDetail(word) {
  practicePanel.innerHTML = `
    <div class="practice-detail">
      <span class="back-link" id="backToList">← All words</span>
      <div class="practice-pair" id="pairDisplay">
        <div class="hy-word">${word.armenian}</div>
        <div class="en-word">${word.english}</div>
      </div>
      <div id="editForm" style="display:none;"></div>
      <div id="answerAreaPractice" style="width:100%;"></div>
      <div class="feedback" id="feedbackPractice"></div>
      <div class="sentence-block">
        <button class="btn btn-ghost btn-block" id="sentenceBtn">Show example sentence</button>
        <div id="sentenceContent"></div>
      </div>
      <div class="practice-actions">
        <button class="btn btn-ghost" id="editBtn" style="flex:1;">Edit</button>
        <button class="btn btn-ghost" id="deleteBtn" style="flex:1; color:var(--wrong); border-color:var(--wrong-soft);">Delete</button>
      </div>
      <div id="deleteConfirm" style="display:none; margin-top:12px;"></div>
    </div>
  `;

  document.getElementById("backToList").addEventListener("click", renderPracticeList);

  wireTypingQuestion(
    word,
    document.getElementById("answerAreaPractice"),
    document.getElementById("feedbackPractice"),
    () => renderPracticeDetail(word)
  );

  document.getElementById("sentenceBtn").addEventListener("click", () => {
    const content = document.getElementById("sentenceContent");
    const { en } = generateExampleSentence(word);
    content.innerHTML = `
      <div style="margin-top:16px;">
        <div class="sentence-en">${en}</div>
      </div>
    `;
    document.getElementById("sentenceBtn").textContent = "Show another";
  });

  // ---- Edit ----
  document.getElementById("editBtn").addEventListener("click", () => {
    document.getElementById("pairDisplay").style.display = "none";
    const formEl = document.getElementById("editForm");
    formEl.style.display = "block";
    formEl.innerHTML = `
      <div style="margin-bottom:24px;">
        <label style="font-size:12px; color:var(--ink-faint); font-weight:600; display:block; margin-bottom:6px;">Armenian</label>
        <input type="text" class="search-input" id="editArmenian" value="${word.armenian}" style="margin-bottom:14px;" />
        <label style="font-size:12px; color:var(--ink-faint); font-weight:600; display:block; margin-bottom:6px;">English</label>
        <input type="text" class="search-input" id="editEnglish" value="${word.english}" style="margin-bottom:14px;" />
        <div style="display:flex; gap:10px;">
          <button class="btn btn-accent" id="saveEditBtn" style="flex:1;">Save</button>
          <button class="btn btn-ghost" id="cancelEditBtn" style="flex:1;">Cancel</button>
        </div>
        <div id="editError" style="color:var(--wrong); font-size:12.5px; margin-top:10px;"></div>
      </div>
    `;

    document.getElementById("cancelEditBtn").addEventListener("click", () => renderPracticeDetail(word));

    document.getElementById("saveEditBtn").addEventListener("click", async () => {
      const newArmenian = document.getElementById("editArmenian").value.trim();
      const newEnglish = document.getElementById("editEnglish").value.trim();
      const errorEl = document.getElementById("editError");

      if (!newArmenian || !newEnglish) {
        errorEl.textContent = "Both fields are required.";
        return;
      }

      // Prevent creating a duplicate of another existing word via edit
      const all = await fetchAllWords();
      const clash = all.find(w => w.id !== word.id && w.english.toLowerCase() === newEnglish.toLowerCase());
      if (clash) {
        errorEl.textContent = `"${newEnglish}" already exists as another word.`;
        return;
      }

      await updateDoc(doc(db, "words", word.id), {
        armenian: newArmenian,
        english: newEnglish,
        english_lower: newEnglish.toLowerCase()
      });

      const updatedWord = { ...word, armenian: newArmenian, english: newEnglish };
      renderPracticeDetail(updatedWord);
    });
  });

  // ---- Delete ----
  document.getElementById("deleteBtn").addEventListener("click", () => {
    const confirmEl = document.getElementById("deleteConfirm");
    confirmEl.style.display = "block";
    confirmEl.innerHTML = `
      <div style="font-size:13px; color:var(--ink-soft); margin-bottom:10px;">Delete "${word.english}" → "${word.armenian}"? This can't be undone.</div>
      <div style="display:flex; gap:10px;">
        <button class="btn" id="confirmDeleteBtn" style="flex:1; background:var(--wrong);">Delete permanently</button>
        <button class="btn btn-ghost" id="cancelDeleteBtn" style="flex:1;">Cancel</button>
      </div>
    `;
    document.getElementById("cancelDeleteBtn").addEventListener("click", () => { confirmEl.style.display = "none"; });
    document.getElementById("confirmDeleteBtn").addEventListener("click", async () => {
      await deleteDoc(doc(db, "words", word.id));
      renderPracticeList();
    });
  });
}

// ---------- Import ----------
function parseImportText(raw) {
  const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
  const pairs = [];
  const isShort = (s) => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 3) return false;
    if (/[.!?]\s*$/.test(s.trim())) return false;
    return true;
  };
  const isArmenian = (s) => /[\u0530-\u058F]/.test(s);
  const isEnglish = (s) => /^[a-zA-Z\s'-]+$/.test(s);

  for (let i = 0; i < lines.length - 1; i++) {
    const a = lines[i], b = lines[i + 1];
    if (!isShort(a) || !isShort(b)) continue;
    if (isEnglish(a) && isArmenian(b)) pairs.push({ english: a, armenian: b });
    else if (isArmenian(a) && isEnglish(b)) pairs.push({ english: b, armenian: a });
  }
  return pairs;
}

async function importPairs(pairs) {
  const existing = await fetchAllWords();
  const existingLower = new Set(existing.map(w => (w.english || "").toLowerCase()));
  let added = 0;
  for (const pair of pairs) {
    const key = pair.english.toLowerCase();
    if (existingLower.has(key)) continue;
    existingLower.add(key);
    const now = Timestamp.fromDate(new Date());
    await addDoc(wordsRef, {
      english: pair.english, english_lower: key, armenian: pair.armenian,
      box: 1, correctStreak: 0, lastReviewed: null, nextReview: now, createdAt: now
    });
    added++;
  }
  return added;
}

function renderImportPanel() {
  importPanel.innerHTML = `
    <div class="import-box">
      <div class="hint">Paste copied text from your Google Translate app history (myactivity.google.com → search "Translate"). Pairs of 3 words or fewer are detected automatically; longer lines are skipped.</div>
      <textarea id="importText" placeholder="Paste your copied history here…"></textarea>
      <button class="btn btn-accent btn-block" id="importBtn">Import words</button>
      <div class="import-result" id="importResult"></div>
    </div>
  `;
  document.getElementById("importBtn").addEventListener("click", async () => {
    const raw = document.getElementById("importText").value;
    const pairs = parseImportText(raw);
    const result = document.getElementById("importResult");
    if (pairs.length === 0) {
      result.style.color = "var(--ink-faint)";
      result.textContent = "No word pairs detected in that text.";
      return;
    }
    result.style.color = "var(--ink-faint)";
    result.textContent = "Importing…";
    const added = await importPairs(pairs);
    result.style.color = "var(--correct)";
    result.textContent = `Added ${added} new word${added === 1 ? "" : "s"} (${pairs.length - added} already existed).`;
    document.getElementById("importText").value = "";
  });
}

// ---------- Words ----------
async function renderWordsPanel() {
  const words = await fetchAllWords();
  const dueCount = words.filter(isDue).length;
  const mastered = words.filter(w => (w.box || 1) >= 5).length;

  wordsPanel.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="num">${words.length}</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="num">${dueCount}</div><div class="label">Due now</div></div>
      <div class="stat-card"><div class="num">${mastered}</div><div class="label">Mastered</div></div>
    </div>
    <div class="section-title">All words</div>
    <div class="word-list" id="wordListEl"></div>
  `;

  const listEl = document.getElementById("wordListEl");
  if (words.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="small">No words yet — they'll show up here once captured or imported.</div></div>`;
    return;
  }

  words
    .sort((a, b) => (a.english || "").localeCompare(b.english || ""))
    .forEach(w => {
      const row = document.createElement("div");
      row.className = "word-row";
      row.innerHTML = `
        <div class="pair"><span class="en">${w.english}</span><span class="hy">${w.armenian}</span></div>
        <span class="box-badge">box ${w.box || 1}</span>
      `;
      row.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelector('.tab[data-tab="practice"]').classList.add("active");
        Object.entries(panels).forEach(([key, el]) => { el.style.display = key === "practice" ? "block" : "none"; });
        renderPracticeDetail(w);
      });
      listEl.appendChild(row);
    });
}

// ---------- Init ----------
(async function init() {
  await renderStreak();
  await loadQueue();
  await renderQuiz();
})();
</script>
